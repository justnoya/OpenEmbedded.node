openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: OpenEmbedded API — visual Discord embed builder
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project CRUD
  - name: export
    description: Export and validation
  - name: webhook
    description: Discord webhook proxy
  - name: bot
    description: Discord bot operations
  - name: openbot
    description: OpenEmbedded official bot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all saved projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /v1/projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Load a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /v1/export/json:
    post:
      operationId: exportJson
      tags: [export]
      summary: Validate and return Discord payload JSON
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphInput"
      responses:
        "200":
          description: Discord payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

  /v1/export/code:
    post:
      operationId: exportCode
      tags: [export]
      summary: Return discord.js v14 code string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphInput"
      responses:
        "200":
          description: Code string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeExportResult"

  /v1/webhook/send:
    post:
      operationId: sendWebhook
      tags: [webhook]
      summary: Proxy send payload to Discord webhook URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookSendInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSendResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/bot/validate:
    post:
      operationId: botValidate
      tags: [bot]
      summary: Validate a bot token and return guilds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotValidateInput"
      responses:
        "200":
          description: Bot info and guilds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotValidateResult"

  /v1/bot/channels:
    post:
      operationId: botGetChannels
      tags: [bot]
      summary: Get text channels for a guild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotChannelsInput"
      responses:
        "200":
          description: List of text channels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotChannelsResult"

  /v1/bot/send:
    post:
      operationId: botSend
      tags: [bot]
      summary: Send a message to a channel using a bot token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotSendInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotSendResult"

  /v1/openbot/guilds:
    get:
      operationId: openBotGuilds
      tags: [openbot]
      summary: List servers the OpenEmbedded Bot is in (with invite URL)
      responses:
        "200":
          description: Guilds and invite URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenBotGuildsResult"

  /v1/openbot/channels:
    post:
      operationId: openBotChannels
      tags: [openbot]
      summary: Get text channels for a guild via the OpenEmbedded Bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenBotChannelsInput"
      responses:
        "200":
          description: List of text channels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenBotChannelsResult"

  /v1/openbot/send:
    post:
      operationId: openBotSend
      tags: [openbot]
      summary: Send a message via the OpenEmbedded Bot (with optional interaction flows)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenBotSendInput"
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenBotSendResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      required: [id, name, graph, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        graph:
          $ref: "#/components/schemas/GraphData"
        payload:
          type: ["object", "null"]
          description: Last compiled Discord payload
        createdAt:
          type: string
        updatedAt:
          type: string

    ProjectInput:
      type: object
      required: [name, graph]
      properties:
        name:
          type: string
          minLength: 1
        graph:
          $ref: "#/components/schemas/GraphData"

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        graph:
          $ref: "#/components/schemas/GraphData"
        payload:
          type: ["object", "null"]

    GraphData:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            type: object
        edges:
          type: array
          items:
            type: object

    GraphInput:
      type: object
      required: [graph]
      properties:
        graph:
          $ref: "#/components/schemas/GraphData"

    ExportResult:
      type: object
      required: [payload, isValid]
      properties:
        payload:
          type: object
        isValid:
          type: boolean
        errors:
          type: array
          items:
            type: string

    CodeExportResult:
      type: object
      required: [code]
      properties:
        code:
          type: string

    WebhookSendInput:
      type: object
      required: [webhookUrl, payload]
      properties:
        webhookUrl:
          type: string
        payload:
          type: object

    WebhookSendResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    BotValidateInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    BotGuild:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: ["string", "null"]

    BotChannel:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string

    BotValidateResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        botName:
          type: ["string", "null"]
        botAvatar:
          type: ["string", "null"]
        guilds:
          type: array
          items:
            $ref: "#/components/schemas/BotGuild"
        message:
          type: ["string", "null"]

    BotChannelsInput:
      type: object
      required: [token, guildId]
      properties:
        token:
          type: string
        guildId:
          type: string

    BotChannelsResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        channels:
          type: array
          items:
            $ref: "#/components/schemas/BotChannel"
        message:
          type: ["string", "null"]

    BotSendInput:
      type: object
      required: [token, channelId, payload]
      properties:
        token:
          type: string
        channelId:
          type: string
        payload:
          type: object

    BotSendResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]

    OpenBotGuild:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: ["string", "null"]

    OpenBotGuildsResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        guilds:
          type: array
          items:
            $ref: "#/components/schemas/OpenBotGuild"
        inviteUrl:
          type: ["string", "null"]
        message:
          type: ["string", "null"]

    OpenBotChannelsInput:
      type: object
      required: [guildId]
      properties:
        guildId:
          type: string

    OpenBotChannelsResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        channels:
          type: array
          items:
            $ref: "#/components/schemas/BotChannel"
        message:
          type: ["string", "null"]

    OpenBotFlow:
      type: object
      required: [customId, mode, responsePayload]
      properties:
        customId:
          type: string
        mode:
          type: string
        responsePayload:
          type: object

    OpenBotSendInput:
      type: object
      required: [channelId, payload]
      properties:
        channelId:
          type: string
        payload:
          type: object
        flows:
          type: array
          items:
            $ref: "#/components/schemas/OpenBotFlow"

    OpenBotSendResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: ["string", "null"]
